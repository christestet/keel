# Maintains a "chore(main): release X.Y.Z" PR with the version bump
# (all workspace Cargo.toml files) and CHANGELOG.md entry, derived from
# Conventional Commits since the last release. Merging that PR pushes the
# `vX.Y.Z` tag directly (skip-github-release: true — no GitHub Release
# object here); the existing tag-triggered release.yml then builds binaries
# and opens the DRAFT release, per docs/release-process.md's human-publishes
# gate.
name: release-please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v5
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
