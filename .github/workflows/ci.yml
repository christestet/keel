name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Determinism and honesty: CI uses the same commands contributors run locally,
# but scopes expensive jobs to the files that changed. scripts/preflight.sh
# remains the full local gate.

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      compiler: ${{ steps.classify.outputs.compiler }}
      conformance: ${{ steps.classify.outputs.conformance }}
      harness: ${{ steps.classify.outputs.harness }}
      docs: ${{ steps.classify.outputs.docs }}
      diagnostics: ${{ steps.classify.outputs.diagnostics }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Classify changed files
        id: classify
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base="origin/${{ github.base_ref }}"
            changed="$(git diff --name-only "$base"...HEAD)"
          elif [ -n "${{ github.event.before }}" ] &&
               [ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]; then
            changed="$(git diff --name-only "${{ github.event.before }}" "${{ github.sha }}")"
          else
            changed="$(git diff --name-only HEAD^ HEAD)"
          fi

          echo "changed files:"
          echo "$changed"

          has() {
            local pattern="$1"
            echo "$changed" | grep -Eq "$pattern"
          }

          compiler=false
          conformance=false
          harness=false
          docs=false
          diagnostics=false

          if has '^(compiler/|Cargo\.toml$|Cargo\.lock$)'; then
            compiler=true
          fi
          if has '^tests/conformance/'; then
            conformance=true
          fi
          if has '(^|/)(AGENTS|CLAUDE)\.md$|^\.agents/|^scripts/(check-harness|preflight)\.sh$|^\.github/workflows/'; then
            harness=true
          fi
          if has '\.md$|^scripts/check-docs\.(rs|sh)$'; then
            docs=true
          fi
          if has '^compiler/keelc-diag/src/registry\.rs$|^docs/diagnostics\.md$|^scripts/(gen|check)-diagnostics-doc\.(rs|sh)$'; then
            diagnostics=true
          fi

          {
            echo "compiler=$compiler"
            echo "conformance=$conformance"
            echo "harness=$harness"
            echo "diagnostics=$diagnostics"
            echo "docs=$docs"
          } >> "$GITHUB_OUTPUT"

  # The conformance suite is the executable spec — it must be structurally
  # valid when conformance cases change, even before a compiler exists (pre-M1).
  conformance-structure:
    needs: changes
    if: needs.changes.outputs.conformance == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Validate conformance suite structure
        run: cargo run -p conformance-runner -- --check

  # Once `keelc` exists (M3+), this job becomes the gate that defines
  # "the compiler is correct". It runs when compiler code or conformance cases
  # change; docs-only and governance-only PRs do not pay for a release build.
  conformance-run:
    needs: changes
    if: needs.changes.outputs.compiler == 'true' || needs.changes.outputs.conformance == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Detect keelc
        id: keelc
        run: |
          if cargo metadata --no-deps --format-version 1 | grep -q '"name":"keelc-driver"'; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "keelc-driver crate not in workspace yet (pre-M3) — skipping execution"
          fi
      - name: Build keelc
        if: steps.keelc.outputs.present == 'true'
        run: cargo build --release -p keelc-driver
      - name: Run conformance suite
        if: steps.keelc.outputs.present == 'true'
        env:
          KEEL_MILESTONE: ${{ vars.KEEL_MILESTONE || 'M5' }}
        run: cargo run -p conformance-runner -- --keelc target/release/keelc

  # M8a / KDR-0019 compile-time contract. This job's own machine is the
  # published reference machine (tests/performance/m8-reference/reference-machine.md)
  # precisely so the gate never depends on a contributor's local hardware.
  # `--enforce` stays off until docs/m8-status.md records this job's own
  # output as the checked-in baseline (see that file for current status).
  m8-benchmark:
    needs: changes
    if: needs.changes.outputs.compiler == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    # Pin GOCACHE to a workspace path so actions/cache can persist Go build
    # artifacts across runs. KDR-0019's "cold build" is a cold *keelc* build on
    # a warmed toolchain (what a developer hits building their first Keel
    # program on an existing Go install) — NOT a first-ever Go std-lib compile.
    # Without this, every run recompiled the Go std lib from scratch and the
    # metric mostly measured Go bootstrap, not keelc. See docs/m8-build-time-profile.md.
    env:
      GOCACHE: ${{ github.workspace }}/.gocache
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Cache Go build artifacts
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.gocache
          # go version keys the cache: std objects are invalidated on Go upgrades.
          # Rolling per-sha key with a stable restore prefix so each run starts
          # from the latest warmed cache and refreshes it.
          key: m8-gocache-${{ runner.os }}-${{ hashFiles('.github/workflows/ci.yml') }}-${{ github.sha }}
          restore-keys: |
            m8-gocache-${{ runner.os }}-${{ hashFiles('.github/workflows/ci.yml') }}-
            m8-gocache-${{ runner.os }}-
      - name: Record reference machine profile
        run: |
          echo "## CPU"; nproc; lscpu | grep -E 'Model name|^CPU\(s\)' || true
          echo "## RAM"; free -h
          echo "## Disk"; df -h /
          echo "## OS"; uname -a; cat /etc/os-release 2>/dev/null || true
          echo "## Rust"; rustc --version
          echo "## Go"; go version
          echo "## keelc commit"; git rev-parse HEAD
      - name: Build keelc (release)
        run: cargo build --release -p keelc-driver
      # Pre-warm the Go std-lib build cache with the SAME flags the benchmark's
      # `go build` uses. `-trimpath` (hermetic build, spec ch.18) has its own
      # cache namespace, so a non-trimpath warm would not be reused.
      - name: Warm Go std-lib build cache
        run: go build -trimpath std
      - name: Run M8 performance fixture
        run: scripts/m8-benchmark.sh --mode full --enforce --known-gap keel_build_incremental

  # The agent harness (nested AGENTS.md/CLAUDE.md, preflight, .claude config)
  # is code: it must not drift as the repo grows. See AGENTS.md "The agent harness".
  harness:
    needs: changes
    if: needs.changes.outputs.harness == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Agent harness self-check
        run: scripts/check-harness.sh

  documentation:
    needs: changes
    if: needs.changes.outputs.docs == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - name: Validate documentation graph
        run: scripts/check-docs.sh

  # docs/diagnostics.md is generated from the keelc-diag registry (AGENTS.md
  # hard rule 4); this keeps the doc from silently drifting from the codes
  # the compiler actually emits.
  diagnostics-doc:
    needs: changes
    if: needs.changes.outputs.diagnostics == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - name: Check generated diagnostics table
        run: scripts/check-diagnostics-doc.sh

  rust-quality:
    needs: changes
    if: needs.changes.outputs.compiler == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace

  # AGENTS.md / CONTRIBUTING.md rule: spec changes, conformance-test changes,
  # and compiler changes never mix in a single PR. Enforced, not requested.
  separation-of-concerns:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: One concern per PR
        run: |
          base="origin/${{ github.base_ref }}"
          changed=$(git diff --name-only "$base"...HEAD)
          echo "changed files:"; echo "$changed"
          # Agent-harness guidance files (AGENTS.md + CLAUDE.md symlinks) are a
          # concern of their own, not spec/test/compiler changes — exclude them.
          changed=$(echo "$changed" | grep -vE '(^|/)(AGENTS|CLAUDE)\.md$' || true)
          areas=0
          spec=$(echo "$changed" | grep -c '^docs/spec/' || true)
          tests=$(echo "$changed" | grep -c '^tests/conformance/' || true)
          comp=$(echo "$changed" | grep -c '^compiler/' || true)
          [ "$spec"  -gt 0 ] && areas=$((areas+1))
          [ "$tests" -gt 0 ] && areas=$((areas+1))
          [ "$comp"  -gt 0 ] && areas=$((areas+1))
          if [ "$areas" -gt 1 ]; then
            echo "::error::This PR mixes concerns (spec:$spec conformance:$tests compiler:$comp files)."
            echo "::error::A behavior change is three PRs, in order: spec -> conformance tests -> implementation. See AGENTS.md."
            exit 1
          fi
          echo "ok: single concern"
