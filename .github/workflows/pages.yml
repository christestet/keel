name: pages

# Publishes the Jekyll developer-docs site. Path-filtered so it only rebuilds
# when something the site actually serves changes — not on every push to
# main (compiler/tests/CI-only changes never touch this workflow).
on:
  push:
    branches: [main]
    paths:
      - "**/*.md"
      - "examples/**"
      - "_config.yml"
      - "assets/**"
      - "_includes/**"
      - "_layouts/**"
      - "_sass/**"
      - "keel-brand-kit/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  # Never cancel an in-flight Pages deployment: cancelling deploy-pages mid-run
  # leaves the Pages backend in a state that fails the next deploy with
  # "Deployment failed, try again later." Queue instead (GitHub's own guidance).
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/configure-pages@v6
      - uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site
      - uses: actions/upload-pages-artifact@v5
        with:
          include-hidden-files: true

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
