# Release artifacts for the developer-preview gate
# (docs/release-process.md, docs/compatibility.md).
#
# Triggered by a version tag. Builds keel/keelc for Linux x86_64 and macOS
# arm64 with the release commit embedded (KEEL_BUILD_COMMIT -> `keel
# --version`), packages tarballs with checksums, and attaches them to a DRAFT
# GitHub release. Publishing the draft is a human decision, per the release
# process — CI never announces a release on its own.
name: release

on:
  push:
    tags: ["v*"]
  # release-please.yml calls this after it pushes the version tag, so the same
  # build serves both the automated path and a manual `git push origin vX.Y.Z`.
  workflow_call:
    inputs:
      tag:
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            slug: linux-x86_64
          - os: macos-latest
            slug: macos-arm64
    runs-on: ${{ matrix.os }}
    # On a tag push this is the tag; on workflow_call the caller passes it in.
    env:
      TAG: ${{ inputs.tag || github.ref_name }}
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - name: Build release binaries
        env:
          KEEL_BUILD_COMMIT: ${{ github.sha }}
        run: cargo build --release -p keelc-driver
      - name: Verify version reporting
        run: |
          out="$(target/release/keel --version)"
          echo "$out"
          echo "$out" | grep -F "commit ${GITHUB_SHA}" \
            || { echo "release binary does not report the release commit"; exit 1; }
      - name: Package tarball with checksum
        run: |
          staging="keel-${TAG}-${{ matrix.slug }}"
          mkdir "$staging"
          cp target/release/keel target/release/keelc LICENSE README.md "$staging/"
          tar czf "$staging.tar.gz" "$staging"
          shasum -a 256 "$staging.tar.gz" > "$staging.tar.gz.sha256"
      - name: Attach to draft release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          staging="keel-${TAG}-${{ matrix.slug }}"
          # Both matrix jobs may race to create the draft; losing the race is fine,
          # the upload below is what each job actually owns.
          gh release view "${TAG}" >/dev/null 2>&1 \
            || gh release create "${TAG}" --draft --verify-tag \
                 --title "keel ${TAG}" \
                 --notes "Draft. Publishing requires the docs/release-process.md gate and its validation snapshot." \
            || true
          gh release upload "${TAG}" \
            "$staging.tar.gz" "$staging.tar.gz.sha256" --clobber
